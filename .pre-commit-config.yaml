# Pre-commit hooks configuration for Error Triage → Jira Upserter service
# Enforces code quality, formatting, and security standards before commits
# Versions pinned to match requirements-dev.txt per Section 0.3.1

# Exclude patterns for hooks
exclude: '^(\.git|\.venv|venv|__pycache__|\.pytest_cache|\.mypy_cache|build|dist|\.egg-info)/'

# Default hook behavior
default_stages: [commit]
fail_fast: false

repos:
  # Standard pre-commit hooks for file cleanup and validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Remove trailing whitespace from all files
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      
      # Ensure files end with a single newline
      - id: end-of-file-fixer
      
      # Validate YAML syntax
      - id: check-yaml
        args: [--safe]
      
      # Validate JSON syntax
      - id: check-json
      
      # Detect accidentally committed private keys
      - id: detect-private-key
      
      # Check for files that would conflict on case-insensitive filesystems
      - id: check-case-conflict
      
      # Ensure Python files have valid syntax
      - id: check-ast
      
      # Check for merge conflict markers
      - id: check-merge-conflict
      
      # Check for debugger imports and breakpoints
      - id: debug-statements

  # Black - Python code formatter
  # Version: 24.10.0 (per Section 0.3.1 requirements-dev.txt)
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        args:
          - --line-length=120
          - --target-version=py311
        files: '^src/.*\.py$|^tests/.*\.py$'

  # isort - Python import sorting
  # Version: 5.13.2 (per Section 0.3.1 requirements-dev.txt)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args:
          - --profile=black
          - --line-length=120
          - --multi-line=3
          - --trailing-comma
          - --force-grid-wrap=0
          - --use-parentheses
          - --ensure-newline-before-comments
        files: '^src/.*\.py$|^tests/.*\.py$'

  # Flake8 - Python linting and style checking
  # Version: 7.1.1 (per Section 0.3.1 requirements-dev.txt)
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args:
          - --config=.flake8
          - --max-line-length=120
          - --extend-ignore=E203,W503
        files: '^src/.*\.py$|^tests/.*\.py$'
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear

  # mypy - Static type checking
  # Version: 1.14.0 (per Section 0.3.1 requirements-dev.txt)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args:
          - --strict
          - --ignore-missing-imports
          - --allow-untyped-calls
          - --allow-untyped-decorators
          - --no-warn-return-any
        files: '^src/.*\.py$'
        exclude: '^tests/.*\.py$'
        additional_dependencies:
          - types-PyYAML
          - types-redis
          - types-requests

  # bandit - Security vulnerability scanner
  # Version: 1.8.0 (per Section 0.3.1 requirements-dev.txt)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args:
          - --recursive
          - --skip=B101,B601  # Skip assert_used and shell_injection_process (false positives)
          - --severity-level=medium
        files: '^src/.*\.py$'
        exclude: '^tests/.*\.py$'

  # Check for common security issues in Python code
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        files: requirements.*\.txt$

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - --strict
          - '--config-data={extends: default, rules: {line-length: {max: 120}, document-start: disable}}'
        files: '^config/.*\.yaml$|^\..*\.ya?ml$|^docker-compose\.ya?ml$'

# CI mode configuration
# When running in CI environment, use all available CPU cores for speed
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
    
    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
