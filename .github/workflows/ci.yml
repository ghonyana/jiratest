# Continuous Integration Workflow for Error Triage → Jira Upserter Service
# 
# Purpose: Validates Python code quality through comprehensive quality gates including
# code formatting, linting, type checking, security scanning, and unit testing with
# coverage enforcement. Prevents merging defective code by enforcing strict pass criteria.
#
# Triggers:
# - Pull requests to any branch
# - Pushes to feature branches (excluding main and develop to avoid duplicate runs)
#
# Quality Gates (per Technical Spec Section 8.6.2):
# - Black code formatting (must pass, no bypass)
# - Flake8 linting (0 errors required, warnings allowed)
# - Mypy static type checking (0 type errors required, strict mode)
# - Bandit security scanning (fail on MEDIUM+ severity, security approval bypass allowed)
# - Safety dependency CVE detection (fail on CRITICAL/HIGH, security approval bypass allowed)
# - Pytest unit tests (100% pass rate, no bypass)
# - Code coverage (≥80% statement coverage, no bypass)
#
# Artifacts Generated:
# - test-results.xml (JUnit format for GitHub UI integration)
# - coverage.xml (Cobertura format for coverage tracking services)
# - bandit-report.sarif (SARIF format for GitHub Security tab)
# - safety-report.sarif (SARIF format for GitHub Security tab)
#
# Retention: 90 days per Technical Spec Section 8.6.4

name: Continuous Integration

on:
  # Trigger on all pull requests for comprehensive validation
  pull_request:
    branches:
      - '**'
  
  # Trigger on pushes to feature branches (excluding main and develop)
  # Main and develop trigger separate workflows (build-push.yml, deploy.yml)
  push:
    branches:
      - '**'
      - '!main'
      - '!develop'

# Prevent concurrent runs on same branch to avoid resource conflicts
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality Gates Job: Parallel execution of code quality checks
  quality-gates:
    name: Code Quality Gates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          # Fetch full history for accurate blame and coverage analysis
          fetch-depth: 0
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          # Enable pip caching for 30-40s execution time improvement
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      
      - name: Install Production Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
        # Use --no-cache-dir to ensure clean install from exact-pinned versions
      
      - name: Install Development Dependencies
        run: |
          pip install --no-cache-dir -r requirements-dev.txt
        # Includes: pytest, black, flake8, mypy, bandit, safety, coverage tools
      
      # Quality Gate 1: Black Code Formatting
      # Requirement: 100% Black style compliance (no bypass allowed)
      - name: Check Code Formatting with Black
        run: |
          echo "=== Quality Gate 1: Black Code Formatting ==="
          black --check --diff src/ tests/
          if [ $? -eq 0 ]; then
            echo "✓ Code formatting compliant with Black style"
          else
            echo "✗ Code formatting issues detected. Run 'black src/ tests/' to auto-fix"
            exit 1
          fi
      
      # Quality Gate 2: Flake8 Linting
      # Requirement: 0 errors (warnings allowed, no bypass)
      - name: Lint Code with Flake8
        run: |
          echo "=== Quality Gate 2: Flake8 Linting ==="
          flake8 src/ tests/ --count --statistics --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s'
          ERROR_COUNT=$(flake8 src/ tests/ --count --select=E,F --quiet | tail -n1 || echo "0")
          
          if [ "$ERROR_COUNT" -eq 0 ]; then
            echo "✓ No linting errors detected"
          else
            echo "✗ Found $ERROR_COUNT linting errors (must be 0 to pass)"
            exit 1
          fi
        # --select=E,F: Only count errors (E) and fatal issues (F), ignore warnings (W)
      
      # Quality Gate 3: Mypy Static Type Checking
      # Requirement: 0 type errors in strict mode (no bypass allowed)
      - name: Type Check with Mypy
        run: |
          echo "=== Quality Gate 3: Mypy Static Type Checking ==="
          mypy src/ --strict --show-error-codes --pretty
          if [ $? -eq 0 ]; then
            echo "✓ No type errors detected in strict mode"
          else
            echo "✗ Type checking failed. Review errors above and fix type annotations"
            exit 1
          fi
      
      # Quality Gate 4: Bandit Security Scanning
      # Requirement: No MEDIUM+ severity findings (security approval bypass allowed)
      - name: Security Scan with Bandit
        run: |
          echo "=== Quality Gate 4: Bandit Security Scanning ==="
          bandit -r src/ -f json -o bandit-report.json || true
          
          # Parse JSON report for MEDIUM+ severity findings
          MEDIUM_HIGH_COUNT=$(jq '[.results[] | select(.issue_severity == "MEDIUM" or .issue_severity == "HIGH")] | length' bandit-report.json)
          
          if [ "$MEDIUM_HIGH_COUNT" -eq 0 ]; then
            echo "✓ No MEDIUM+ security findings detected"
          else
            echo "⚠ Found $MEDIUM_HIGH_COUNT MEDIUM+ security findings"
            echo "Review findings in GitHub Security tab after SARIF upload"
            echo "Security approval required to bypass this gate"
            exit 1
          fi
        continue-on-error: false
      
      # Quality Gate 5: Safety Dependency CVE Scanning
      # Requirement: No CRITICAL/HIGH CVEs (security approval bypass allowed)
      - name: Dependency CVE Scan with Safety
        run: |
          echo "=== Quality Gate 5: Safety Dependency CVE Scanning ==="
          safety check --json --output safety-report.json || true
          
          # Parse JSON report for CRITICAL/HIGH CVEs
          if [ -f safety-report.json ]; then
            CRITICAL_HIGH_COUNT=$(jq '[.vulnerabilities[] | select(.severity == "CRITICAL" or .severity == "HIGH")] | length' safety-report.json 2>/dev/null || echo "0")
            
            if [ "$CRITICAL_HIGH_COUNT" -eq 0 ]; then
              echo "✓ No CRITICAL/HIGH CVEs detected in dependencies"
            else
              echo "⚠ Found $CRITICAL_HIGH_COUNT CRITICAL/HIGH CVEs in dependencies"
              echo "Review CVEs in GitHub Security tab after SARIF upload"
              echo "Security approval required to bypass this gate"
              exit 1
            fi
          else
            echo "⚠ Safety report not generated, failing gate"
            exit 1
          fi
        continue-on-error: false
      
      # Convert JSON reports to SARIF format for GitHub Security tab upload
      - name: Convert Bandit Report to SARIF
        if: always()
        run: |
          echo "Converting Bandit JSON report to SARIF format..."
          
          # Install SARIF conversion tool
          pip install sarif-tools
          
          # Convert bandit JSON to SARIF
          # Bandit doesn't natively output SARIF, so we create a basic SARIF structure
          python3 << 'EOF'
          import json
          import sys
          
          with open('bandit-report.json', 'r') as f:
              bandit_data = json.load(f)
          
          sarif = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "Bandit",
                          "version": "1.8.0",
                          "informationUri": "https://bandit.readthedocs.io/"
                      }
                  },
                  "results": []
              }]
          }
          
          for result in bandit_data.get('results', []):
              severity_map = {
                  "LOW": "note",
                  "MEDIUM": "warning",
                  "HIGH": "error"
              }
              
              sarif_result = {
                  "ruleId": result['test_id'],
                  "level": severity_map.get(result['issue_severity'], 'warning'),
                  "message": {
                      "text": result['issue_text']
                  },
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {
                              "uri": result['filename']
                          },
                          "region": {
                              "startLine": result['line_number']
                          }
                      }
                  }]
              }
              sarif['runs'][0]['results'].append(sarif_result)
          
          with open('bandit-report.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          
          print(f"✓ Converted {len(sarif['runs'][0]['results'])} Bandit findings to SARIF")
          EOF
      
      - name: Convert Safety Report to SARIF
        if: always()
        run: |
          echo "Converting Safety JSON report to SARIF format..."
          
          python3 << 'EOF'
          import json
          import sys
          
          try:
              with open('safety-report.json', 'r') as f:
                  safety_data = json.load(f)
          except FileNotFoundError:
              print("⚠ safety-report.json not found, creating empty SARIF")
              safety_data = {"vulnerabilities": []}
          
          sarif = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "Safety",
                          "version": "3.2.9",
                          "informationUri": "https://pyup.io/safety/"
                      }
                  },
                  "results": []
              }]
          }
          
          for vuln in safety_data.get('vulnerabilities', []):
              severity_map = {
                  "LOW": "note",
                  "MEDIUM": "warning",
                  "HIGH": "error",
                  "CRITICAL": "error"
              }
              
              sarif_result = {
                  "ruleId": vuln.get('id', 'UNKNOWN'),
                  "level": severity_map.get(vuln.get('severity', 'MEDIUM'), 'warning'),
                  "message": {
                      "text": f"{vuln.get('package_name', 'unknown')} {vuln.get('affected_version', '')}: {vuln.get('advisory', 'Vulnerability detected')}"
                  },
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {
                              "uri": "requirements.txt"
                          }
                      }
                  }]
              }
              sarif['runs'][0]['results'].append(sarif_result)
          
          with open('safety-report.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          
          print(f"✓ Converted {len(sarif['runs'][0]['results'])} Safety CVEs to SARIF")
          EOF
      
      # Upload SARIF reports to GitHub Security tab
      - name: Upload Bandit SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: bandit-report.sarif
          category: bandit-security-scan
      
      - name: Upload Safety SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: safety-report.sarif
          category: safety-dependency-scan
      
      # Upload JSON reports as artifacts for debugging and auditing
      - name: Upload Security Reports as Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            bandit-report.sarif
            safety-report.json
            safety-report.sarif
          retention-days: 90
  
  # Unit Tests Job: Run test suite with coverage enforcement
  unit-tests:
    name: Unit Tests with Coverage
    runs-on: ubuntu-latest
    needs: quality-gates
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r requirements-dev.txt
      
      # Run unit tests with coverage measurement
      # Per Technical Spec Section 8.6.2: ≥80% statement coverage required
      - name: Run Unit Tests with Coverage
        run: |
          echo "=== Unit Tests with Coverage Enforcement ==="
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            --cov-fail-under=80 \
            --junitxml=test-results.xml \
            -v
          
          # pytest will fail automatically if coverage < 80% due to --cov-fail-under flag
          
          if [ $? -eq 0 ]; then
            echo "✓ All unit tests passed with ≥80% coverage"
          else
            echo "✗ Unit tests failed or coverage below 80% threshold"
            exit 1
          fi
      
      # Display coverage summary in workflow logs
      - name: Display Coverage Summary
        if: always()
        run: |
          echo "=== Coverage Report Summary ==="
          coverage report --skip-covered --show-missing
      
      # Upload coverage report to Codecov or similar service
      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: error-triage-coverage
          fail_ci_if_error: false
      
      # Upload test results and coverage artifacts
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
            htmlcov/
          retention-days: 90
      
      # Publish test results to GitHub UI (PR comments)
      - name: Publish Test Results to GitHub
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml
          check_name: Unit Test Results
          comment_mode: always
  
  # Summary Job: Aggregate status for branch protection rules
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality-gates, unit-tests]
    if: always()
    
    steps:
      - name: Check Quality Gates Status
        if: needs.quality-gates.result != 'success'
        run: |
          echo "✗ Quality gates failed. Review formatting, linting, type checking, or security scan results."
          exit 1
      
      - name: Check Unit Tests Status
        if: needs.unit-tests.result != 'success'
        run: |
          echo "✗ Unit tests failed or coverage below 80%. Review test results and fix failing tests."
          exit 1
      
      - name: CI Passed
        run: |
          echo "=========================================="
          echo "✓ All CI Quality Gates Passed Successfully"
          echo "=========================================="
          echo ""
          echo "Summary:"
          echo "  ✓ Code formatting compliant (Black)"
          echo "  ✓ No linting errors (Flake8)"
          echo "  ✓ No type errors (Mypy strict mode)"
          echo "  ✓ No security vulnerabilities (Bandit)"
          echo "  ✓ No critical CVEs (Safety)"
          echo "  ✓ All unit tests passed"
          echo "  ✓ Code coverage ≥80%"
          echo ""
          echo "Ready to merge! 🎉"
