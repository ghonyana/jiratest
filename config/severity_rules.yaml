# Severity Rules Configuration
# 
# Purpose: Maps error frequency thresholds to Jira priority and severity levels
# Used by: SeverityRulesEngine service to classify errors based on 5-minute rolling occurrence counts
# 
# Evaluation Logic:
#   - Rules are evaluated in descending min_count order (highest threshold first)
#   - First matching rule where (occurrence_count >= min_count) determines classification
#   - If no environment-specific rule matches, falls back to 'default' rules
#   - Enables severity escalation when frequency increases cross new thresholds
#
# Field Definitions:
#   - min_count: Minimum error occurrences in 5-minute window to trigger this rule
#   - priority: Jira issue priority field value (Highest, High, Medium, Low)
#   - severity: Custom Jira severity field value (SEV1, SEV2, SEV3, SEV4)

version: "1.0"

# Production Environment Rules
# Rationale: Production errors have immediate customer impact; aggressive thresholds
# ensure critical issues (50+ errors/5min) get highest priority while maintaining
# signal-to-noise ratio for lower-volume errors
production:
  - min_count: 50
    priority: "Highest"
    severity: "SEV1"
    # Critical: 50+ errors in 5 minutes indicates widespread production failure
    # requiring immediate response and potential incident declaration

  - min_count: 10
    priority: "High"
    severity: "SEV2"
    # High Impact: 10-49 errors in 5 minutes suggests significant but localized
    # production issue affecting multiple users; requires urgent investigation

  - min_count: 1
    priority: "Medium"
    severity: "SEV3"
    # Baseline: Single production error warrants tracking and investigation
    # within standard SLA; may indicate emerging issue

# Staging Environment Rules
# Rationale: Staging errors indicate pre-production issues; higher thresholds than
# production since staging tolerates more noise but serious problems still require
# attention before release
staging:
  - min_count: 20
    priority: "High"
    severity: "SEV2"
    # Serious: 20+ errors in staging suggests systemic issue that will impact
    # production if deployed; blocks release until resolved

  - min_count: 5
    priority: "Medium"
    severity: "SEV3"
    # Moderate: 5-19 errors indicates reproducible staging issue requiring
    # investigation before production deployment

  - min_count: 1
    priority: "Low"
    severity: "SEV4"
    # Tracking: Single staging error logged for awareness; may be transient
    # or expected during testing activities

# Development Environment Rules
# Rationale: Development errors are expected during active coding; only high-frequency
# issues warrant Jira tracking to avoid noise from normal development iteration
development:
  - min_count: 10
    priority: "Medium"
    severity: "SEV3"
    # Persistent Issue: 10+ errors in development suggests broken test suite
    # or widely-impacting code change requiring developer attention

  - min_count: 1
    priority: "Low"
    severity: "SEV4"
    # Informational: Single development error logged for reference; normal
    # during active development and testing

# Default Fallback Rules
# Rationale: Applies to any environment not explicitly configured above (e.g., local,
# qa, demo); conservative classification until environment-specific rules defined
default:
  - min_count: 1
    priority: "Low"
    severity: "SEV4"
    # Catch-All: Unknown environment defaults to lowest severity; prevents
    # missed errors while avoiding false alarms from test environments

# Configuration Notes:
# 
# 1. Threshold Tuning: Adjust min_count values based on observed error rates
#    after initial deployment. Monitor for both false positives (too sensitive)
#    and false negatives (too permissive).
#
# 2. Adding Environments: Create new top-level keys (e.g., 'qa:', 'canary:')
#    following the same structure as existing environments.
#
# 3. Priority Escalation: When error frequency increases and crosses a higher
#    threshold, SeverityRulesEngine triggers priority escalation on existing
#    Jira issues (e.g., Medium → High → Highest).
#
# 4. Hot Reload: Service supports SIGHUP signal to reload this configuration
#    without restart. Validate YAML syntax before deployment to avoid errors.
#
# 5. Custom Fields: Ensure Jira project has 'customfield_10050' configured
#    for severity values (SEV1-SEV4) before deploying these rules.
